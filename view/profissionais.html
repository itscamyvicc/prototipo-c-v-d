<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profissionais</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/view/css/profissionais.css">

    <!-- BOXICONS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<!-- ===== CABEÇALHO ===== -->
<div class="page-header">
    <div class="page-header-left">
        <h1>Profissionais</h1>
        <p>Gerencie o cadastro de profissionais.</p>
    </div>
    <button class="btn-novo">
        <i class='bx bx-plus'></i> Novo Profissional
    </button>
</div>

<!-- ===== MODAL / FORM ===== -->
<div class="tabela_primaria">
    <div class="header-container">
        <header>Novo Profissional</header>
        <i class='bx bx-x close-icon'></i>
    </div>

    <form action="#" id="formInfo">
        <div class="details">
            <div class="fields">

                <div class="input-field">
                    <label>Nome Completo <span class="obrigatorio">*</span></label>
                    <input type="text" placeholder="Seu nome completo" required>
                </div>

                <div class="input-field">
                    <label>CPF <span class="obrigatorio">*</span></label>
                    <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00"
                        pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
                        title="Digite um CPF válido: 000.000.000-00"
                        required>
                </div>

                <div class="input-field">
                    <label>Cargo <span class="obrigatorio">*</span></label>
                    <input type="text" placeholder="Ex: Médico" required>
                </div>

                <div class="input-field">
                    <label>Setor</label>
                    <input type="text" placeholder="Ex: UTI, Pediatria">
                </div>

                <div class="input-field">
                    <label>E-mail</label>
                    <input type="text" placeholder="seuemail@gmail.com">
                </div>

                <div class="input-field">
                    <label>Telefone</label>
                    <input type="text" id="telefone" maxlength="15" placeholder="(00) 00000-0000"
                        pattern="\(\d{2}\) \d{5}-\d{4}"
                        title="Digite um telefone válido: (00) 00000-0000">
                </div>

                <div class="input-field">
                    <label>Data de Admissão</label>
                    <input type="date" id="dataAdmissao" 
                        min="2000-01-01" 
                        max="2026-12-31">
                </div>

                <div class="input-field">
                    <label>Status <span class="obrigatorio">*</span></label>
                    <select required>
                        <option value="" disabled selected>Selecione o status</option>
                        <option value="ativo">Ativo</option>
                        <option value="afastado">Afastado</option>
                        <option value="ferias">Férias</option>
                        <option value="licenca">Licença</option>
                        <option value="desligado">Desligado</option>
                    </select>
                </div>

            </div>

            <div class="form-actions">
                <button class="button btn-cancelar" type="reset">Cancelar</button>
                <button class="button btn-cadastrar" type="submit">Cadastrar</button>
            </div>
        </div>
    </form>
</div>
<!-- ===== FIM FORM ===== -->

<!-- ===== POPUP SUCESSO ===== -->
<div id="popup-sucesso">
    <div class="popup-box">
        <div class="popup-icone">✓</div>
        <h3 id="popup-titulo"></h3>
        <p id="popup-mensagem"></p>
        <button id="popup-fechar">OK</button>
    </div>
</div>
<!-- ===== FIM POPUP ===== -->

<!-- ===== LISTA ===== -->
<section class="lista-profissionais">
    <div class="conteudo-lista">

        <div class="topo-lista">
            <div class="busca">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Buscar por nome, CPF ou e-mail...">
            </div>

            <div class="filtro">
                <select>
                    <option value="">Todos os Cargos</option>
                    <option value="méd">Médico / Médica</option>
                    <option value="enferm">Enfermeiro / Enfermeira</option>
                    <option value="recepcion">Recepcionista</option>
                </select>
            </div>
        </div>

        <!-- CARDS SERÃO INSERIDOS VIA JS -->

    </div>
</section>
<!-- ===== FIM LISTA ===== -->

</body>
</html>
