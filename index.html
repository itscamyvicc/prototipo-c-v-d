<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.V.D - Controle de Validade Documental</title>
    <link rel="stylesheet" href="/frontend/view/css/conteudoPrincipal.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <nav class="sidebar">
        <header>
            <div class="image-text">
                <span class="image">
                    <img src="/frontend/assets/img/logo.png" alt="logo" id="logo-easter">
                </span>
                <div class="text header-text">
                    <span class="name">C.V.D</span>
                    <span class="profession">Controle de Validade Documental</span>
                </div>
            </div>
        </header>

        <div class="menu-bar">
            <div class="menu">
                <ul class="menu-links">
                    <h4>Navegação Principal</h4>
                    <li class="nav-link">
                        <a href="#" data-tela="dashboard" class="ativo">
                            <i class='bx bx-home-alt icon'></i>
                            <span class="text nav-text">Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="#" data-tela="profissionais">
                            <i class='bx bx-id-card icon'></i>
                            <span class="text nav-text">Profissionais</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="#" data-tela="documentos">
                            <i class='bx bx-file icon'></i>
                            <span class="text nav-text">Documentos</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="#" data-tela="alertas">
                            <i class='bx bxs-bell-ring icon'></i>
                            <span class="text nav-text">Alertas</span>
                        </a>
                    </li>
                    <h4>Administração</h4>
                    <li class="nav-link">
                        <a href="#" data-tela="importar_exportar">
                            <i class='bx bx-import icon'></i>
                            <span class="text nav-text">Importar/Exportar</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="#" data-tela="config">
                            <i class='bx bx-cog icon'></i>
                            <span class="text nav-text">Configurações</span>
                        </a>
                    </li>
                    <li class="nav-link nav-link-sair">
                        <a href="#" id="btn-sair">
                            <i class='bx bx-log-out icon'></i>
                            <span class="text nav-text">Sair</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="conteudo-principal" id="conteudo-principal">
        <div class="loading-tela">Carregando...</div>
    </main>

    <script type="module" src="/frontend/controller/conteudo.ctrl.js"></script>
</body>
</html>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        let cliques = 0;
        let timer;

        document.getElementById('logo-easter').addEventListener('click', () => {
            cliques++;
            clearTimeout(timer);
            timer = setTimeout(() => { cliques = 0; }, 800);

            if (cliques >= 3) {
                cliques = 0;

                const msg = document.createElement('div');
                msg.innerHTML = '🔓 TI BUCHA Ativado!';
                msg.style.cssText = `
                    position: fixed; top: 50%; left: 50%;
                    transform: translate(-50%, -50%);
                    background: #003366; color: #00ffcc;
                    padding: 20px 40px; border-radius: 12px;
                    font-size: 24px; font-weight: 700;
                    z-index: 9999; font-family: monospace;
                    box-shadow: 0 0 30px #00ffcc;
                    animation: fadeOut 3s forwards;
                `;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 3000);
            }
        });
    });
</script>
