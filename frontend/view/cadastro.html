<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CVD</title>
    <link rel="stylesheet" href="css/login_cadastro.css">
</head>

<body>
    <div class="container">
        <div class="lado-esquerdo">
            <div class="logo-container">
                <div class="logo">
                     <img src="/frontend/assets/img/logo.png" alt="logo CVD">
                </div>
                <h1>CVD</h1>
                <p>Controle de Validade<br>Documental</p>
            </div>
        </div>

        <div class="lado-direito">
            <div class="form-container">

                <a href="#" id="btn-voltar" class="btn-voltar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                    </svg>
                    Voltar
                </a>

                <div class="form-header">
                    <h2>Crie sua conta</h2>
                </div>

                <!-- Alerta de erro/sucesso -->
                <div id="register-alert" style="display:none; margin-bottom:12px;"></div>

                <form id="formCadastro">
                    <div class="input-group">
                        <label for="reg-email">E-mail</label>
                        <input type="email" id="reg-email" placeholder="seuemail@exemplo.com" required>
                        <span id="reg-email-err" style="color:red; font-size:12px;"></span>
                    </div>

                    <div class="input-group">
                        <label for="reg-password">Senha</label>
                        <input type="password" id="reg-password" placeholder="Mínimo 10 caracteres" required>
                        <span id="reg-password-err" style="color:red; font-size:12px;"></span>
                    </div>

                    <div class="input-group">
                        <label for="reg-confirm">Confirme sua senha</label>
                        <input type="password" id="reg-confirm" placeholder="Repita a senha" required>
                        <span id="reg-confirm-err" style="color:red; font-size:12px;"></span>
                    </div>

                    <button type="submit" class="btn-primary">Criar Conta</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        // ✅ CORREÇÃO 1: Caminho correto do firebase-config
        // Ajuste abaixo para o caminho real no seu projeto.
        // Se o arquivo fica em /frontend/firebase/firebase-config.js, use esse caminho.
        import { auth } from "/firebase-config.js";

        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // ---------- Utilitários ----------

        function clearAlerts() {
            const el = document.getElementById('register-alert');
            el.style.display = 'none';
            el.textContent = '';
        }

        function clearErrors() {
            document.querySelectorAll('span[id$="-err"]').forEach(el => el.textContent = '');
        }

        function showErr(id, msg) {
            document.getElementById(id).textContent = msg;
        }

        function setAlert(id, tipo, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
            el.style.color = tipo === 'error' ? 'red' : 'green';
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ---------- Cadastro ----------

        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlerts();
            clearErrors();

            const email    = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm  = document.getElementById('reg-confirm').value;

            let valid = true;
            if (!isValidEmail(email))  { showErr('reg-email-err',    'Informe um e-mail válido.'); valid = false; }
            if (password.length < 10)  { showErr('reg-password-err', 'Mínimo 10 caracteres.');    valid = false; }
            if (password !== confirm)  { showErr('reg-confirm-err',  'As senhas não coincidem.'); valid = false; }
            if (!valid) return;

            const btnSubmit = document.querySelector('#formCadastro button[type="submit"]');
            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Criando conta...';

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                setAlert('register-alert', 'success', 'Cadastro realizado! Redirecionando...');

                // ✅ CORREÇÃO 2: Redireciona para o login após 1.5s
                // Ajuste o caminho abaixo conforme seu projeto
                setTimeout(() => window.location.replace('/frontend/view/login.html'), 1500);

            } catch (erro) {
                console.error(erro);
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'Criar Conta';

                const mensagens = {
                    'auth/email-already-in-use': 'Este e-mail já está cadastrado.',
                    'auth/invalid-email':         'E-mail inválido.',
                    'auth/weak-password':         'Senha muito fraca. Use pelo menos 10 caracteres.',
                    'auth/network-request-failed':'Sem conexão com a internet. Tente novamente.',
                    'auth/too-many-requests':     'Muitas tentativas. Aguarde alguns minutos.',
                };
                const msg = mensagens[erro.code] ?? 'Erro ao cadastrar. Tente novamente.';
                setAlert('register-alert', 'error', msg);
            }
        });

        // ---------- Botão Voltar ----------

        document.getElementById('btn-voltar')?.addEventListener('click', async (e) => {
            e.preventDefault();

            // Se a página usa SPA (carrega HTML dinamicamente no #conteudo-principal)
            const conteudo = document.getElementById('conteudo-principal');
            if (conteudo) {
                const resposta = await fetch('/frontend/view/login.html');
                const html = await resposta.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                conteudo.innerHTML = doc.body.innerHTML;
                import(`/frontend/controller/login.ctrl.js?t=${Date.now()}`).catch(console.error);
            } else {
                // ✅ Se for página standalone, apenas navega de volta
                window.location.replace('/frontend/view/login.html');
            }
        });
    </script>

</body>
</html>
